spring.application.name=SelfOrderingSystem

# Load local .env (if present) so its values can fill the ${...} placeholders below.
# Real environment variables still take precedence, e.g. on Render.
spring.config.import=optional:file:.env[.properties]

#PostgreSQL reference
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

#Picture restriction
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=-1

#Cloudinary configuration
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}

#razorpay configuration
razorpay.api.key= ${RAZORPAY_API_KEY}
razorpay.api.secret= ${RAZORPAY_API_SECRET}

#Mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=geekysayan@gmail.com
spring.mail.password= ${SMTP_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
